<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 72" width="300" height="72" role="img" aria-label="OBAS">
  <defs>
    <linearGradient id="obasWord" x1="0" y1="0" x2="72" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00DCFA"/>
      <stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>
  <!-- Mark -->
  <g transform="translate(4,4)">
    <circle cx="32" cy="32" r="18" fill="none" stroke="url(#obasWord)" stroke-width="7"
            stroke-linecap="round" pathLength="100" stroke-dasharray="78 100" transform="rotate(-6 32 32)"/>
    <circle cx="50" cy="32" r="4.5" fill="#7C5CFF"/>
  </g>
  <!-- Wordmark (renders in Space Grotesk where the font is loaded; falls back gracefully) -->
  <text x="84" y="50" font-family="'Space Grotesk','Sora',system-ui,sans-serif"
        font-size="44" font-weight="700" letter-spacing="6" fill="#FFFFFF">OBAS</text>
</svg>
