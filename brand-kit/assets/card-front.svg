<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 550" width="850" height="550" role="img" aria-label="OBAS business card — front">
  <defs>
    <linearGradient id="markG" x1="60" y1="190" x2="190" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00DCFA"/><stop offset=".55" stop-color="#02E6F3"/><stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
    <radialGradient id="glow" cx="100%" cy="0%" r="90%">
      <stop offset="0" stop-color="#7C5CFF" stop-opacity="0.35"/>
      <stop offset="0.45" stop-color="#0261E9" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#0261E9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00DCFA"/><stop offset="1" stop-color="#7C5CFF"/>
    </linearGradient>
  </defs>
  <rect width="850" height="550" fill="#000915"/>
  <rect width="850" height="550" fill="url(#glow)"/>
  <!-- dot grid texture -->
  <g fill="#ffffff" fill-opacity="0.05">
    <circle cx="700" cy="60" r="2"/><circle cx="740" cy="60" r="2"/><circle cx="780" cy="60" r="2"/>
    <circle cx="700" cy="100" r="2"/><circle cx="740" cy="100" r="2"/><circle cx="780" cy="100" r="2"/>
  </g>
  <!-- Loop mark -->
  <g transform="translate(70,213) scale(1.95)">
    <circle cx="32" cy="32" r="18" fill="none" stroke="url(#markG)" stroke-width="7" stroke-linecap="round" pathLength="100" stroke-dasharray="78 100" transform="rotate(-6 32 32)"/>
    <circle cx="50" cy="32" r="4.5" fill="#7C5CFF"/>
  </g>
  <!-- Wordmark + tagline -->
  <text x="215" y="312" font-family="'Space Grotesk','Sora',sans-serif" font-size="118" font-weight="700" letter-spacing="10" fill="#FFFFFF">OBAS</text>
  <rect x="217" y="338" width="56" height="4" rx="2" fill="url(#rule)"/>
  <text x="217" y="372" font-family="'Inter',sans-serif" font-size="22" font-weight="600" letter-spacing="7" fill="#00DCFA">DRIVING DIGITAL IMPACT</text>
  <text x="70" y="500" font-family="'Inter',sans-serif" font-size="20" font-weight="500" letter-spacing="2" fill="#9DB2C9">obas.com</text>
  <text x="780" y="500" text-anchor="end" font-family="'Inter',sans-serif" font-size="20" font-weight="500" letter-spacing="2" fill="#9DB2C9">Riyadh · KSA</text>
</svg>
